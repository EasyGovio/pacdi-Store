<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kod Üretici (Gizli)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#04162E;color:#eaf2fb;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;min-height:100vh;padding:16px;}
.app{max-width:420px;margin:0 auto;}
h1{color:#F6B45F;font-size:1.1rem;margin-bottom:4px;}
.sub{color:#7a9ab8;font-size:0.75rem;margin-bottom:20px;}
.card{background:#0a1828;border:1px solid rgba(246,180,95,0.15);border-radius:12px;padding:18px;}
label{font-size:0.78rem;color:#7a9ab8;display:block;margin-bottom:6px;}
input{width:100%;background:#04162E;border:1px solid rgba(246,180,95,0.25);color:#eaf2fb;padding:10px;border-radius:8px;font-size:0.9rem;margin-bottom:14px;}
button{width:100%;background:#F6B45F;color:#04162E;border:none;padding:12px;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.9rem;}
.result{margin-top:16px;padding:14px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.3);border-radius:8px;display:none;}
.result code{font-family:'Courier New',monospace;font-size:1.05rem;color:#34D399;font-weight:700;display:block;text-align:center;margin:8px 0;word-break:break-all;}
.copy-btn{background:transparent;border:1px solid rgba(52,211,153,0.4);color:#34D399;padding:8px;border-radius:6px;font-size:0.8rem;width:100%;cursor:pointer;margin-top:8px;}
</style>
</head>
<body>
<div class="app">
  <h1>🔑 Quittung — Kişisel Kod Üretici</h1>
  <div class="sub">Sadece senin kullanımın için. Kimseye bu sayfanın linkini verme.</div>

  <div class="card">
    <label>Kodun geçerli olacağı son gün</label>
    <input type="date" id="expiryDate">
    <button onclick="generate()">Kod Üret</button>

    <div class="result" id="result">
      <div style="font-size:0.75rem;color:#7a9ab8;">Bu kodu ilgili kişiye ver:</div>
      <code id="codeOutput"></code>
      <button class="copy-btn" onclick="copyCode()">📋 Kopyala</button>
    </div>
  </div>
</div>

<script>
function simpleChecksum(dateStr) {
  var salt = 'pacdi-quittung-2026';
  var str = dateStr + salt;
  var hash = 0;
  for (var i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash).toString(16).toUpperCase().slice(0, 4).padStart(4, '0');
}

function generate() {
  var dateVal = document.getElementById('expiryDate').value;
  if (!dateVal) { alert('Lütfen bir tarih seç.'); return; }
  var parts = dateVal.split('-');
  var dateStr = parts[0] + parts[1] + parts[2];
  var checksum = simpleChecksum(dateStr);
  var code = 'PACDI-' + dateStr + '-' + checksum;
  document.getElementById('codeOutput').textContent = code;
  document.getElementById('result').style.display = 'block';
}

function copyCode() {
  var code = document.getElementById('codeOutput').textContent;
  navigator.clipboard.writeText(code).then(function(){
    alert('Kopyalandı!');
  }).catch(function(){
    prompt('Elle kopyala:', code);
  });
}
</script>
</body>
</html>
