<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="canonical" href="https://pacdi.store/password.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifre Oluşturucu | PACDI Store</title>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <link rel="stylesheet" href="/assets/common.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8426936740213369" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E6ML8EDW0H"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-E6ML8EDW0H");</script>
</head>
<body>
<div class="app-container">
  <nav id="mainNav"></nav>
  <div class="user-panel" id="userPanel"></div>

  <h1 style="color:#F6B45F; margin-bottom:16px;">🔐 Şifre Oluşturucu</h1>

  <div style="background:#0a1018; border-radius:20px; padding:20px;">
    <div style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-bottom:16px;">
      <label style="color:#9bb7d4; font-size:0.8rem;">
        Uzunluk:
        <input type="number" id="passwordLength" value="16" min="8" max="64" style="width:60px; background:#1e2a3a; color:#eaf2fb; border:1px solid #F6B45F; border-radius:8px; padding:4px; text-align:center;">
      </label>
      <label style="color:#9bb7d4; font-size:0.8rem;">
        <input type="checkbox" id="includeUpper" checked> Büyük Harf
      </label>
      <label style="color:#9bb7d4; font-size:0.8rem;">
        <input type="checkbox" id="includeLower" checked> Küçük Harf
      </label>
      <label style="color:#9bb7d4; font-size:0.8rem;">
        <input type="checkbox" id="includeNumbers" checked> Rakam
      </label>
      <label style="color:#9bb7d4; font-size:0.8rem;">
        <input type="checkbox" id="includeSymbols" checked> Özel Karakter
      </label>
    </div>

    <button id="generatePasswordBtn" class="generate-btn">🔑 Şifre Oluştur</button>

    <div id="passwordResult" style="margin-top:16px; background:#1e2a3a; padding:16px; border-radius:12px; font-size:1.2rem; font-weight:bold; color:#eaf2fb; word-break:break-all; display:flex; justify-content:space-between; align-items:center;">
      <span id="generatedPassword">********</span>
      <button onclick="copyPassword()" style="background:#F6B45F; border:none; padding:6px 16px; border-radius:20px; cursor:pointer;">📋 Kopyala</button>
    </div>

    <div style="margin-top:16px;">
      <button id="savePasswordBtn" style="background:#0a1018; border:1px solid #2ECC71; color:#2ECC71; padding:8px 16px; border-radius:30px; cursor:pointer;">💾 Şifreyi Kaydet</button>
    </div>
    <div id="savedPasswords" style="margin-top:12px; text-align:left;"></div>
  </div>

  <div class="footer" style="margin-top:24px;">PACDI Store · <a href="/legal.html" style="color:rgba(246,180,95,0.6);text-decoration:none;font-size:0.65rem;">Impressum & Datenschutz</a></div>
</div>

<script src="/assets/common.js"></script>
<script>
  (function() {
    let saved = JSON.parse(localStorage.getItem('savedPasswords') || '[]');

    function generatePassword() {
      const length = parseInt(document.getElementById('passwordLength').value) || 16;
      const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const lower = 'abcdefghijklmnopqrstuvwxyz';
      const numbers = '0123456789';
      const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
      let chars = '';
      if (document.getElementById('includeUpper').checked) chars += upper;
      if (document.getElementById('includeLower').checked) chars += lower;
      if (document.getElementById('includeNumbers').checked) chars += numbers;
      if (document.getElementById('includeSymbols').checked) chars += symbols;
      if (!chars) { alert('En az bir karakter türü seçin.'); return ''; }
      let password = '';
      for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return password;
    }

    function displayPassword(pwd) {
      document.getElementById('generatedPassword').innerText = pwd;
    }

    document.getElementById('generatePasswordBtn').addEventListener('click', function() {
      const pwd = generatePassword();
      if (pwd) displayPassword(pwd);
    });

    window.copyPassword = function() {
      const pwd = document.getElementById('generatedPassword').innerText;
      if (pwd && pwd !== '********') {
        navigator.clipboard.writeText(pwd).then(() => alert('Kopyalandı!'));
      }
    };

    document.getElementById('savePasswordBtn').addEventListener('click', function() {
      const pwd = document.getElementById('generatedPassword').innerText;
      if (!pwd || pwd === '********') { alert('Önce bir şifre oluşturun.'); return; }
      const note = prompt('Bu şifre için bir not girin (isteğe bağlı):');
      saved.push({ password: pwd, note: note || '', date: new Date().toISOString() });
      localStorage.setItem('savedPasswords', JSON.stringify(saved));
      renderSaved();
    });

    function renderSaved() {
      const container = document.getElementById('savedPasswords');
      if (!saved.length) {
        container.innerHTML = '<p style="color:#9bb7d4;">Kayıtlı şifre yok.</p>';
        return;
      }
      container.innerHTML = '<h3 style="color:#F6B45F;">📂 Kayıtlı Şifreler</h3>' +
        saved.slice(-5).reverse().map(item =>
          `<div style="background:#0a1018; padding:8px 12px; border-radius:8px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center;">
            <span style="color:#eaf2fb; font-size:0.85rem;">${item.password} ${item.note ? '📝 ' + item.note : ''}</span>
            <span style="color:#9bb7d4; font-size:0.6rem;">${new Date(item.date).toLocaleString()}</span>
          </div>`
        ).join('');
    }

    // Pro özelliklerini override
    window.enableProFeatures = function(enable) {};

    document.addEventListener('DOMContentLoaded', function() {
      renderSaved();
      // Varsayılan bir şifre oluştur
      displayPassword(generatePassword());
    });
  })();
</script>
</body>
</html>
