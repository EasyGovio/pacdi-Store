<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <link rel="canonical" href="https://pacdi.store/scanner.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>QR Tarayıcı | PACDI Store</title>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <link rel="stylesheet" href="/assets/common.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8426936740213369" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E6ML8EDW0H"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-E6ML8EDW0H");</script>
</head>
<body>
<div class="app-container">
  <nav id="mainNav"></nav>
  <div class="user-panel" id="userPanel"></div>

  <h1 style="color:#F6B45F; margin-bottom:16px;">📷 QR / Barkod Tarayıcı</h1>

  <div id="reader" style="width:100%; max-width:500px; margin:0 auto;"></div>

  <div id="result" style="margin-top:16px; color:#eaf2fb;"></div>

  <button id="scanAgainBtn" style="display:none; margin-top:12px; background:#F6B45F; border:none; padding:10px 24px; border-radius:40px; font-weight:bold; color:#04162E; cursor:pointer;">Yeniden Tara</button>

  <div id="history" style="margin-top:24px; text-align:left;"></div>

  <div class="footer" style="margin-top:24px;">PACDI Store · <a href="/legal.html" style="color:rgba(246,180,95,0.6);text-decoration:none;font-size:0.65rem;">Impressum & Datenschutz</a></div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="/assets/common.js"></script>
<script>
  (function() {
    let html5QrCode;
    let scanHistory = JSON.parse(localStorage.getItem('scanHistory') || '[]');

    function startScanner() {
      if (html5QrCode) {
        html5QrCode.stop().then(() => {
          html5QrCode.clear();
          startScanner();
        });
        return;
      }
      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 250 } };
      html5QrCode.start(
        { facingMode: "environment" },
        config,
        onScanSuccess,
        onScanError
      );
    }

    function onScanSuccess(decodedText, decodedResult) {
      document.getElementById('result').innerHTML = `
        <div style="background:#0a1018; padding:16px; border-radius:12px;">
          <strong style="color:#2ECC71;">✅ Okundu:</strong>
          <span style="color:#eaf2fb; word-break:break-all;">${decodedText}</span>
          <button onclick="saveHistory('${decodedText}')" style="background:#F6B45F; border:none; padding:6px 16px; border-radius:20px; margin-top:8px; cursor:pointer;">Kaydet</button>
        </div>
      `;
      document.getElementById('scanAgainBtn').style.display = 'inline-block';
      if (html5QrCode) html5QrCode.stop();
    }

    function onScanError(err) {
      // sessiz
    }

    window.saveHistory = function(text) {
      scanHistory.push({ text, date: new Date().toISOString() });
      localStorage.setItem('scanHistory', JSON.stringify(scanHistory));
      renderHistory();
    };

    function renderHistory() {
      const container = document.getElementById('history');
      if (!scanHistory.length) {
        container.innerHTML = '<p style="color:#9bb7d4;">Henüz tarama yok.</p>';
        return;
      }
      container.innerHTML = '<h3 style="color:#F6B45F;">📜 Geçmiş</h3>' +
        scanHistory.slice(-10).reverse().map(item =>
          `<div style="background:#0a1018; padding:8px 12px; border-radius:8px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center;">
            <span style="color:#eaf2fb; font-size:0.85rem;">${item.text}</span>
            <span style="color:#9bb7d4; font-size:0.6rem;">${new Date(item.date).toLocaleString()}</span>
          </div>`
        ).join('');
    }

    document.getElementById('scanAgainBtn').addEventListener('click', function() {
      document.getElementById('result').innerHTML = '';
      this.style.display = 'none';
      startScanner();
    });

    // Pro özelliklerini override (scanner'da pro özelliği yok)
    window.enableProFeatures = function(enable) {};

    document.addEventListener('DOMContentLoaded', function() {
      startScanner();
      renderHistory();
    });
  })();
</script>
</body>
</html>
