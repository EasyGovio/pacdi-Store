<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <title>QR / Barcode Scanner | PACDI Store</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8426936740213369" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #04162E; color: #eaf2fb; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; padding: 16px; }
    .app { max-width: 560px; margin: 0 auto; }
    nav { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 20px; background: rgba(4,22,46,0.8); border-radius: 12px; padding: 8px; }
    nav a { color: #7a9ab8; text-decoration: none; font-size: 0.7rem; padding: 5px 10px; border-radius: 16px; border: 1px solid transparent; transition: 0.2s; white-space: nowrap; }
    nav a:hover, nav a.active { border-color: #F6B45F; color: #F6B45F; background: rgba(246,180,95,0.06); }
    h1 { color: #F6B45F; font-size: 1.3rem; margin-bottom: 14px; font-weight: 700; }
    #reader { width: 100%; border-radius: 16px; overflow: hidden; background: #0a1828; border: 1px solid rgba(246,180,95,0.2); min-height: 280px; }
    #result { margin-top: 14px; }
    .result-card { background: #0a1828; padding: 14px 16px; border-radius: 12px; border-left: 4px solid #34D399; word-break: break-all; }
    .result-label { color: #34D399; font-weight: 700; font-size: 0.82rem; margin-bottom: 6px; }
    .result-value { color: #eaf2fb; font-size: 0.88rem; margin-bottom: 10px; line-height: 1.5; }
    .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .error-box { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); padding: 12px 16px; border-radius: 10px; color: #f87171; font-size: 0.85rem; line-height: 1.6; }
    .status-box { color: #7a9ab8; font-size: 0.85rem; padding: 8px 0; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .btn { background: #F6B45F; border: none; padding: 9px 20px; border-radius: 40px; font-weight: 700; color: #04162E; cursor: pointer; font-size: 0.85rem; transition: 0.2s; font-family: inherit; white-space: nowrap; }
    .btn:hover { background: #f0c870; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid #F6B45F; color: #F6B45F; }
    .btn-outline:hover { background: rgba(246,180,95,0.08); }
    .btn-green { background: #34D399; color: #04162E; }
    .btn-sm { font-size: 0.75rem; padding: 5px 14px; }
    #fileInput { display: none; }
    #scanAgainBtn { display: none; }
    #stopBtn { display: none; }
    #history { margin-top: 22px; }
    #history h3 { color: #F6B45F; font-size: 0.9rem; margin-bottom: 10px; }
    .history-item { background: #0a1828; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; gap: 8px; }
    .history-item .text { color: #eaf2fb; word-break: break-all; flex: 1; }
    .history-item .date { color: #7a9ab8; font-size: 0.65rem; flex-shrink: 0; }
    .empty-history { color: #7a9ab8; font-size: 0.85rem; }
    .footer { margin-top: 28px; font-size: 0.65rem; color: #4a6a88; text-align: center; border-top: 1px solid rgba(246,180,95,0.08); padding-top: 16px; }
    .footer a { color: rgba(246,180,95,0.5); text-decoration: none; }
    #tempReader { position: fixed; left: -9999px; top: 0; width: 300px; height: 300px; }
  </style>
</head>
<body>
<div class="app">
  <nav>
    <a href="/">&#127968; Home</a>
    <a href="/qr.html">&#9643; QR</a>
    <a href="/pruefprotokoll.html">&#9889; Pr&uuml;f</a>
    <a href="/scanner.html" class="active">&#128247; Scan</a>
    <a href="/password.html">&#128272; Pass</a>
  </nav>

  <h1>&#128247; QR / Barcode Scanner</h1>

  <div id="reader"></div>
  <div id="result"></div>

  <div class="btn-group">
    <button id="startBtn" class="btn">&#9654; Start Camera</button>
    <button id="stopBtn" class="btn btn-outline">&#9646;&#9646; Stop</button>
    <button id="scanAgainBtn" class="btn">&#128260; Scan Again</button>
    <button id="uploadBtn" class="btn btn-outline">&#128228; Upload Image</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div id="history"></div>
  <div class="footer">PACDI Store &middot; <a href="/legal.html">Legal &amp; Privacy</a></div>
</div>

<div id="tempReader"></div>

<script>
(function() {

  // ── Gemini'nin çalışan yaklaşımı:
  // html5QrCode.start({ facingMode: "environment" }, config, cb)
  // getCameras() YOK, deviceId YOK — sadece string facingMode

  var scanner = null;
  var isScanning = false;
  var scanHistory = [];

  try { scanHistory = JSON.parse(localStorage.getItem('pacdi_scan_history') || '[]'); } catch(e) {}

  var resultEl    = document.getElementById('result');
  var startBtn    = document.getElementById('startBtn');
  var stopBtn     = document.getElementById('stopBtn');
  var scanAgainBtn= document.getElementById('scanAgainBtn');
  var uploadBtn   = document.getElementById('uploadBtn');
  var fileInput   = document.getElementById('fileInput');

  var config = { fps: 10, qrbox: { width: 250, height: 250 } };

  // ── History ──
  function renderHistory() {
    var el = document.getElementById('history');
    if (!scanHistory.length) { el.innerHTML = '<div class="empty-history">&#128237; No scans yet.</div>'; return; }
    var h = '<h3>&#128220; History</h3>';
    scanHistory.slice(-10).reverse().forEach(function(item) {
      var s = item.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      h += '<div class="history-item"><span class="text">'+s+'</span><span class="date">'+new Date(item.date).toLocaleString()+'</span></div>';
    });
    el.innerHTML = h;
  }

  function saveHistory(text) {
    var last = scanHistory[scanHistory.length-1];
    if (last && last.text===text && Date.now()-new Date(last.date).getTime()<5000) return;
    scanHistory.push({text:text, date:new Date().toISOString()});
    try { localStorage.setItem('pacdi_scan_history', JSON.stringify(scanHistory)); } catch(e) {}
    renderHistory();
  }

  // ── UI ──
  function showStatus(msg) { resultEl.innerHTML = '<div class="status-box">'+msg+'</div>'; }
  function showError(msg)  { resultEl.innerHTML = '<div class="error-box">&#10060; '+msg+'</div>'; }

  function showResult(text) {
    stopCamera();
    var isUrl = /^https?:\/\//i.test(text);
    var card = document.createElement('div');
    card.className = 'result-card';
    var lbl = document.createElement('div'); lbl.className='result-label'; lbl.textContent='\u2713 Scanned:';
    var val = document.createElement('div'); val.className='result-value'; val.textContent=text;
    var acts = document.createElement('div'); acts.className='result-actions';

    var saveBtn = document.createElement('button');
    saveBtn.className='btn btn-green btn-sm'; saveBtn.textContent='Save';
    saveBtn.addEventListener('click', function(){ saveHistory(text); saveBtn.textContent='Saved \u2713'; saveBtn.disabled=true; });

    var copyBtn = document.createElement('button');
    copyBtn.className='btn btn-outline btn-sm'; copyBtn.textContent='Copy';
    copyBtn.addEventListener('click', function(){
      if (navigator.clipboard) { navigator.clipboard.writeText(text).then(function(){ copyBtn.textContent='Copied \u2713'; }); }
      else { var ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); copyBtn.textContent='Copied \u2713'; }
    });
    acts.appendChild(saveBtn);
    acts.appendChild(copyBtn);

    if (isUrl) {
      var a = document.createElement('a');
      a.className='btn btn-sm'; a.href=text; a.target='_blank'; a.rel='noopener noreferrer';
      a.style.textDecoration='none'; a.textContent='Open \u2192';
      acts.appendChild(a);
    }

    card.appendChild(lbl); card.appendChild(val); card.appendChild(acts);
    resultEl.innerHTML=''; resultEl.appendChild(card);
    scanAgainBtn.style.display='inline-block';
    stopBtn.style.display='none';

    if (navigator.vibrate) navigator.vibrate(100);
  }

  // ── Camera ──
  function startCamera() {
    document.getElementById('reader').innerHTML = '';
    scanner = new Html5Qrcode('reader');
    showStatus('Starting camera...');
    startBtn.style.display = 'none';
    scanAgainBtn.style.display = 'none';

    // Gemini'nin çalışan yaklaşımı — string facingMode, no getCameras()
    scanner.start(
      { facingMode: "environment" },
      config,
      function onSuccess(text) { showResult(text); },
      function onError() { /* silent */ }
    ).then(function() {
      isScanning = true;
      resultEl.innerHTML = '';
      stopBtn.style.display = 'inline-block';
    }).catch(function(err) {
      showError('Camera error: ' + err + '<br>Please allow camera access and try again.');
      startBtn.style.display = 'inline-block';
    });
  }

  function stopCamera() {
    if (!scanner || !isScanning) return;
    scanner.stop().catch(function(){});
    isScanning = false;
    stopBtn.style.display = 'none';
    startBtn.style.display = 'inline-block';
  }

  // ── File scan ──
  function scanFile(file) {
    if (!file) return;
    stopCamera();
    showStatus('Reading image...');
    var tempEl = document.getElementById('tempReader');
    tempEl.innerHTML = '';
    var tempScanner = new Html5Qrcode('tempReader');
    tempScanner.scanFile(file, false)
      .then(function(text) { showResult(text); tempEl.innerHTML = ''; })
      .catch(function() {
        showError('No QR/barcode found.<br>&#128161; Tip: ensure code fills most of the image and lighting is good.');
        tempEl.innerHTML = '';
      });
  }

  // ── Events ──
  startBtn.addEventListener('click', startCamera);

  stopBtn.addEventListener('click', function() {
    stopCamera();
    resultEl.innerHTML = '';
  });

  scanAgainBtn.addEventListener('click', function() {
    scanAgainBtn.style.display = 'none';
    resultEl.innerHTML = '';
    startCamera();
  });

  uploadBtn.addEventListener('click', function() { fileInput.click(); });
  fileInput.addEventListener('change', function() {
    if (this.files && this.files.length) scanFile(this.files[0]);
    this.value = '';
  });

  window.addEventListener('beforeunload', function() { stopCamera(); });

  // ── Auto-start ──
  renderHistory();
  startCamera();

})();
</script>
</body>
</html>
