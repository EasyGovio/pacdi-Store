<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="canonical" href="https://pacdi.store/scanner.html">
  <title>QR / Barkod Tarayıcı | PACDI Store</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8426936740213369" crossorigin="anonymous"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E6ML8EDW0H"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-E6ML8EDW0H");</script>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #04162E;
      color: #eaf2fb;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 16px;
      display: flex;
      justify-content: center;
    }
    .app-container {
      max-width: 600px;
      width: 100%;
    }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 20px;
      background: rgba(4,22,46,0.8);
      border-radius: 12px;
      padding: 8px;
    }
    nav a {
      color: #7a9ab8;
      text-decoration: none;
      font-size: 0.7rem;
      padding: 5px 10px;
      border-radius: 16px;
      border: 1px solid transparent;
      transition: 0.2s;
      white-space: nowrap;
    }
    nav a:hover, nav a.active {
      border-color: #F6B45F;
      color: #F6B45F;
      background: rgba(246,180,95,0.06);
    }
    h1 {
      color: #F6B45F;
      font-size: 1.3rem;
      margin-bottom: 14px;
      font-weight: 700;
    }
    #reader {
      width: 100%;
      max-width: 100%;
      background: #0a1828;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(246,180,95,0.2);
      position: relative;
      min-height: 280px;
    }
    #reader video {
      width: 100%;
      display: block;
    }
    #result {
      margin-top: 14px;
      min-height: 40px;
    }
    .result-card {
      background: #0a1828;
      padding: 14px 16px;
      border-radius: 12px;
      border-left: 4px solid #34D399;
      word-break: break-all;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    .result-card strong { color: #34D399; margin-right: 6px; }
    .result-card span { color: #eaf2fb; flex: 1; }
    .error-box {
      background: rgba(248,113,113,0.15);
      border: 1px solid rgba(248,113,113,0.3);
      padding: 10px 14px;
      border-radius: 8px;
      color: #f87171;
      font-size: 0.9rem;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .btn {
      background: #F6B45F;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 700;
      color: #04162E;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.2s;
      font-family: inherit;
    }
    .btn:hover { background: #f0c870; transform: scale(1.02); }
    .btn-outline {
      background: transparent;
      border: 1px solid #F6B45F;
      color: #F6B45F;
    }
    .btn-outline:hover { background: rgba(246,180,95,0.08); transform: none; }
    #scanAgainBtn { display: none; }
    #fileInput { display: none; }
    #history {
      margin-top: 22px;
    }
    #history h3 {
      color: #F6B45F;
      font-size: 0.9rem;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .history-item {
      background: #0a1828;
      padding: 6px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(246,180,95,0.06);
      font-size: 0.85rem;
    }
    .history-item .text { color: #eaf2fb; word-break: break-all; }
    .history-item .date { color: #7a9ab8; font-size: 0.6rem; margin-left: 10px; flex-shrink: 0; }
    .empty-history { color: #7a9ab8; font-size: 0.85rem; }
    .footer {
      margin-top: 28px;
      font-size: 0.65rem;
      color: #4a6a88;
      text-align: center;
      border-top: 1px solid rgba(246,180,95,0.08);
      padding-top: 16px;
    }
    .footer a { color: rgba(246,180,95,0.5); text-decoration: none; }
    @media (max-width: 480px) {
      nav a { font-size: 0.6rem; padding: 4px 8px; }
      h1 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <nav id="mainNav">
    <a href="/">🏠 Ana Sayfa</a>
    <a href="/qr.html">🔳 QR</a>
    <a href="/pruefprotokoll.html">⚡ Prüf</a>
    <a href="/scanner.html" class="active">📷 Scan</a>
    <a href="/shortener.html">🔗 Link</a>
    <a href="/password.html">🔐 Pass</a>
  </nav>

  <h1>📷 QR / Barkod Tarayıcı</h1>

  <div id="reader"></div>

  <div id="result"></div>

  <div class="btn-group">
    <button id="scanAgainBtn" class="btn">🔄 Yeniden Tara</button>
    <button id="uploadBtn" class="btn btn-outline">📤 Resim Yükle</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div id="history"></div>

  <div class="footer">PACDI Store · <a href="/legal.html">Impressum & Datenschutz</a></div>
</div>

<script>
(function() {
  'use strict';
  var html5QrCode = null;
  var scanHistory = JSON.parse(localStorage.getItem('scanHistory') || '[]');
  var isScanning = false;
  var readerElement = document.getElementById('reader');

  function renderHistory() {
    var container = document.getElementById('history');
    if (!scanHistory.length) {
      container.innerHTML = '<div class="empty-history">📭 Henüz tarama yok.</div>';
      return;
    }
    var html = '<h3>📜 Geçmiş</h3>';
    var reversed = scanHistory.slice(-10).reverse();
    for (var i = 0; i < reversed.length; i++) {
      var item = reversed[i];
      html += '<div class="history-item">' +
        '<span class="text">' + item.text + '</span>' +
        '<span class="date">' + new Date(item.date).toLocaleString() + '</span>' +
        '</div>';
    }
    container.innerHTML = html;
  }

  function showResult(text) {
    var resultDiv = document.getElementById('result');
    resultDiv.innerHTML = 
      '<div class="result-card">' +
        '<strong>✅ Okundu:</strong>' +
        '<span>' + text + '</span>' +
        '<button id="instantSaveBtn" class="btn" style="font-size:0.75rem; padding:4px 14px; margin-left:auto;">💾 Kaydet</button>' +
      '</div>';
    
    document.getElementById('instantSaveBtn').addEventListener('click', function() {
      window.saveHistory(text);
      this.textContent = '🔒 Kaydedildi';
      this.disabled = true;
      this.style.background = '#34D399';
      this.style.color = '#04162E';
    });

    document.getElementById('scanAgainBtn').style.display = 'inline-block';
  }

  function showError(msg) {
    document.getElementById('result').innerHTML = 
      '<div class="error-box">❌ ' + msg + '</div>';
  }

  function stopScanner(callback) {
    if (html5QrCode && isScanning) {
      html5QrCode.stop().then(function() {
        isScanning = false;
        if (callback) callback();
      }).catch(function(err) {
        console.warn('Durdurma hatası:', err);
        isScanning = false;
        if (callback) callback();
      });
    } else {
      if (callback) callback();
    }
  }

  function startScanner() {
    if (isScanning) {
      stopScanner(function() {
        setTimeout(startScanner, 300);
      });
      return;
    }

    readerElement.innerHTML = '';

    try {
      html5QrCode = new Html5Qrcode("reader");
      var config = {
        fps: 15,
        qrbox: { width: 260, height: 200 },
        aspectRatio: 1.0
      };

      html5QrCode.start(
        { facingMode: "environment" },
        config,
        function(decodedText) {
          stopScanner(function() {
            showResult(decodedText);
          });
        },
        function(errorMessage) {}
      ).then(function() {
        isScanning = true;
        document.getElementById('result').innerHTML = '';
        document.getElementById('scanAgainBtn').style.display = 'none';
      }).catch(function(err) {
        showError('Kamera başlatılamadı: ' + err);
      });
    } catch (e) {
      showError('Tarayıcı oluşturulamadı: ' + e.message);
    }
  }

  function scanImageFile(file) {
    if (!file) return;

    stopScanner(function() {
      var tempDiv = document.createElement('div');
      tempDiv.id = 'tempReader';
      tempDiv.style.display = 'none';
      document.body.appendChild(tempDiv);

      var tempScanner = new Html5Qrcode('tempReader');
      tempScanner.scanFile(file, true)
        .then(function(decodedText) {
          showResult(decodedText);
          document.body.removeChild(tempDiv);
        })
        .catch(function(err) {
          showError('Resim okunamadı: ' + err);
          document.body.removeChild(tempDiv);
        });
    });
  }

  document.getElementById('scanAgainBtn').addEventListener('click', function() {
    document.getElementById('result').innerHTML = '';
    this.style.display = 'none';
    startScanner();
  });

  document.getElementById('uploadBtn').addEventListener('click', function() {
    document.getElementById('fileInput').click();
  });

  document.getElementById('fileInput').addEventListener('change', function(e) {
    if (this.files && this.files.length > 0) {
      scanImageFile(this.files[0]);
    }
    this.value = '';
  });

  window.saveHistory = function(text) {
    var isDuplicate = scanHistory.some(function(item) {
      return item.text === text && (new Date() - new Date(item.date)) < 5000;
    });
    if (isDuplicate) return;

    scanHistory.push({ text: text, date: new Date().toISOString() });
    localStorage.setItem('scanHistory', JSON.stringify(scanHistory));
    renderHistory();
  };

  window.enableProFeatures = function(enable) {};

  document.addEventListener('DOMContentLoaded', function() {
    renderHistory();
    startScanner();
  });

  window.addEventListener('beforeunload', function() {
    if (html5QrCode && isScanning) {
      html5QrCode.stop().catch(function(e) {});
    }
  });

})();
</script>
</body>
</html>
